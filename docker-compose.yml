version: "3.9"

services:
  backend:
    build:
      context: ./mola-backend
      dockerfile: Dockerfile
    container_name: mola-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./mola-frontend
      dockerfile: Dockerfile
    container_name: mola-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
